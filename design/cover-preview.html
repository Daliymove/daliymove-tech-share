<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>封面预览 · daliyMove 技术分享</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 40px; background: #EDE7DA; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: #232B22; }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 4px; font-weight: 700; }
  .sub { color: #646E62; font-size: 13px; margin: 0 0 28px; }
  .block { margin: 0 0 40px; }
  .label { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #4F7A52; font-family: ui-monospace, monospace; margin: 0 0 10px; }
  .og { border-radius: 18px; overflow: hidden; box-shadow: 0 18px 50px rgba(35,43,34,0.18); }
  .og img { display: block; width: 100%; height: auto; }
  .card { width: 340px; height: 144px; border-radius: 14px; overflow: hidden; box-shadow: 0 10px 30px rgba(35,43,34,0.14); }
  .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .note { font-size: 12px; color: #646E62; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>文章封面预览</h1>
  <p class="sub">按 Direction A「有机手账风」重做 · public/images/og/default.png（1200×630）</p>

  <div class="block">
    <p class="label">① 完整 OG 分享图</p>
    <div class="og">
      <img src="../public/images/og/default.png" width="1200" height="630" alt="daliyMove 技术分享 cover" />
    </div>
  </div>

  <div class="block">
    <p class="label">② 卡片内显示效果 (340 × 144，object-cover 裁切中间横带)</p>
    <div class="card">
      <img src="../public/images/og/default.png" alt="cover" />
    </div>
    <p class="note">内容已整体缩放 94% 并留出安全边距，文字不再被边缘裁切；卡片裁切时仍保留「daliyMove / 技术分享」+ 手绘下划线。</p>
  </div>
</div>
</body>
</html>
