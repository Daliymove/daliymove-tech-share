<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">daliyMove Logo Concepts</title>
  <desc id="desc">Six artistic dM logo concepts for daliyMove Tech Notes.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8f1"/>
      <stop offset="1" stop-color="#efe9dc"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f4c33"/>
      <stop offset="1" stop-color="#4f7a52"/>
    </linearGradient>
    <linearGradient id="bark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7f5539"/>
      <stop offset="1" stop-color="#c99a6a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#232b22" flood-opacity=".13"/>
    </filter>
    <style>
      .title { font: 700 54px Georgia, 'Noto Serif SC', serif; fill:#232b22; }
      .sub { font: 500 21px Manrope, 'Noto Sans SC', sans-serif; fill:#646e62; }
      .card-title { font: 800 18px Manrope, 'Noto Sans SC', sans-serif; fill:#232b22; letter-spacing:.04em; }
      .card-desc { font: 500 14px Manrope, 'Noto Sans SC', sans-serif; fill:#646e62; }
      .mono { font: 700 15px 'IBM Plex Mono', Consolas, monospace; fill:#9a6b3f; letter-spacing:.12em; }
    </style>
  </defs>

  <rect width="1400" height="980" rx="46" fill="url(#page)"/>
  <circle cx="1230" cy="120" r="210" fill="#4f7a52" opacity=".08"/>
  <circle cx="125" cy="880" r="230" fill="#9a6b3f" opacity=".08"/>
  <text x="88" y="92" class="title">dM 艺术标识方向</text>
  <text x="90" y="132" class="sub">从低成本文字标识升级为更有记忆点的品牌图标：叶子、纸张、印章、路径、工程感。</text>

  <!-- Card helper dimensions: 386 x 250 -->
  <g transform="translate(88 190)" filter="url(#softShadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".86" stroke="#fff"/>
    <g transform="translate(46 38)">
      <rect width="132" height="132" rx="34" fill="url(#green)"/>
      <path d="M81 33c-24 15-38 36-43 64 28-7 48-25 59-55-7 3-15 8-25 17" fill="none" stroke="#fbf8f1" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="22" y="102" fill="#fbf8f1" font-family="Georgia, serif" font-size="58" font-weight="700">d</text>
      <text x="63" y="102" fill="#fbf8f1" font-family="Georgia, serif" font-size="58" font-weight="700">M</text>
      <path d="M28 107c28-8 46 7 74-1" fill="none" stroke="#c99a6a" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="214" y="72" class="mono">01</text>
    <text x="214" y="104" class="card-title">Leaf Monogram</text>
    <text x="214" y="134" class="card-desc">叶子 + dM 字母</text>
    <text x="214" y="158" class="card-desc">品牌感最强，适合默认 Logo</text>
  </g>

  <g transform="translate(507 190)" filter="url(#softShadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".86" stroke="#fff"/>
    <g transform="translate(47 36)">
      <rect width="136" height="136" rx="18" fill="url(#bark)"/>
      <rect x="13" y="13" width="110" height="110" rx="10" fill="none" stroke="#fbf8f1" stroke-width="4" stroke-opacity=".88"/>
      <path d="M36 92c16-46 45-61 72-62-8 38-30 63-72 62Z" fill="#fbf8f1" opacity=".92"/>
      <path d="M43 86c17-19 35-35 55-47" fill="none" stroke="#7f5539" stroke-width="4" stroke-linecap="round"/>
      <text x="29" y="71" fill="#fbf8f1" font-family="Georgia, serif" font-size="48" font-weight="700" opacity=".92">dM</text>
    </g>
    <text x="214" y="72" class="mono">02</text>
    <text x="214" y="104" class="card-title">Ink Seal</text>
    <text x="214" y="134" class="card-desc">东方印章 / 木色调</text>
    <text x="214" y="158" class="card-desc">更文艺，但技术感弱一点</text>
  </g>

  <g transform="translate(926 190)" filter="url(#softShadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".86" stroke="#fff"/>
    <g transform="translate(45 35)">
      <circle cx="68" cy="68" r="68" fill="url(#green)"/>
      <path d="M38 98V52c0-20 17-35 36-26 20 9 18 43-4 51-10 4-19 2-28-4M78 100V48l31 50 31-50v52" fill="none" stroke="#fbf8f1" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="38" cy="52" r="5" fill="#c99a6a"/>
      <circle cx="140" cy="100" r="5" fill="#c99a6a"/>
    </g>
    <text x="214" y="72" class="mono">03</text>
    <text x="214" y="104" class="card-title">Trail Loop</text>
    <text x="214" y="134" class="card-desc">一笔路径形成 dM</text>
    <text x="214" y="158" class="card-desc">适合“持续前进”的寓意</text>
  </g>

  <g transform="translate(88 480)" filter="url(#softShadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".86" stroke="#fff"/>
    <g transform="translate(47 37)">
      <rect width="136" height="136" rx="32" fill="#fbf8f1" stroke="#3a5c3e" stroke-width="6"/>
      <path d="M35 100V34h28c32 0 43 22 37 43-5 19-23 26-43 24H35Z" fill="#3a5c3e"/>
      <path d="M79 102V43l28 42 28-42v59" fill="none" stroke="#9a6b3f" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M100 34h36v36" fill="#d9e6d2" opacity=".9"/>
    </g>
    <text x="214" y="72" class="mono">04</text>
    <text x="214" y="104" class="card-title">Paper Fold</text>
    <text x="214" y="134" class="card-desc">纸张折角 + 字母结构</text>
    <text x="214" y="158" class="card-desc">更像知识卡片 / 笔记应用</text>
  </g>

  <g transform="translate(507 480)" filter="url(#softShadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".86" stroke="#fff"/>
    <g transform="translate(47 36)">
      <rect width="136" height="136" rx="68" fill="#161b16"/>
      <path d="M32 94c35-8 60-31 72-67-38 8-63 31-72 67Z" fill="#88b189"/>
      <path d="M44 88c20-21 38-37 55-49" fill="none" stroke="#161b16" stroke-width="4" stroke-linecap="round"/>
      <path d="M28 108h34M62 108v-22M74 108h34M108 108v-24M42 34v22h28" fill="none" stroke="#c99a6a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="28" cy="108" r="4" fill="#fbf8f1"/><circle cx="108" cy="84" r="4" fill="#fbf8f1"/><circle cx="42" cy="34" r="4" fill="#fbf8f1"/>
    </g>
    <text x="214" y="72" class="mono">05</text>
    <text x="214" y="104" class="card-title">Circuit Leaf</text>
    <text x="214" y="134" class="card-desc">叶子 + 电路节点</text>
    <text x="214" y="158" class="card-desc">技术感最强，适合工程博客</text>
  </g>

  <g transform="translate(926 480)" filter="url(#softShadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".86" stroke="#fff"/>
    <g transform="translate(47 36)">
      <rect width="136" height="136" rx="36" fill="url(#green)"/>
      <text x="24" y="94" fill="#fbf8f1" font-family="Georgia, 'Noto Serif SC', serif" font-size="72" font-weight="700" letter-spacing="-8">dM</text>
      <path d="M28 104c30-10 54 11 84-1" fill="none" stroke="#c99a6a" stroke-width="5" stroke-linecap="round"/>
      <path d="M93 24c20 8 30 22 31 43-20-7-32-20-31-43Z" fill="#fbf8f1" opacity=".88"/>
    </g>
    <text x="214" y="72" class="mono">06</text>
    <text x="214" y="104" class="card-title">Editorial Serif</text>
    <text x="214" y="134" class="card-desc">高级衬线字母 + 叶片</text>
    <text x="214" y="158" class="card-desc">保留 dM，但更精致优雅</text>
  </g>

  <text x="90" y="810" class="sub">建议：如果想要“技术博客 + 长期知识分享”的平衡，优先选 01 / 05 / 06。</text>
  <text x="90" y="848" class="sub">01 更品牌化，05 更工程化，06 更优雅编辑部感。</text>
</svg>
