<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Abstract Logo Concepts</title>
  <desc id="desc">Six abstract logo concepts without dM letters for daliyMove.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8f1"/>
      <stop offset="1" stop-color="#efe9dc"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f4c33"/>
      <stop offset="1" stop-color="#4f7a52"/>
    </linearGradient>
    <linearGradient id="bark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7f5539"/>
      <stop offset="1" stop-color="#c99a6a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#232b22" flood-opacity=".13"/>
    </filter>
    <style>
      .title { font: 700 54px Georgia, 'Noto Serif SC', serif; fill:#232b22; }
      .sub { font: 500 21px Manrope, 'Noto Sans SC', sans-serif; fill:#646e62; }
      .card-title { font: 800 18px Manrope, 'Noto Sans SC', sans-serif; fill:#232b22; letter-spacing:.04em; }
      .card-desc { font: 500 14px Manrope, 'Noto Sans SC', sans-serif; fill:#646e62; }
      .mono { font: 700 15px 'IBM Plex Mono', Consolas, monospace; fill:#9a6b3f; letter-spacing:.12em; }
    </style>
  </defs>

  <rect width="1400" height="980" rx="46" fill="url(#page)"/>
  <circle cx="1230" cy="120" r="210" fill="#4f7a52" opacity=".08"/>
  <circle cx="125" cy="880" r="230" fill="#9a6b3f" opacity=".08"/>
  <text x="88" y="92" class="title">无字母抽象 Logo 方向</text>
  <text x="90" y="132" class="sub">不出现 dM，用更高级的符号表达：长期生长、路径推进、知识纸张、工程节点。</text>

  <g transform="translate(88 190)" filter="url(#shadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".88" stroke="#fff"/>
    <g transform="translate(48 38)">
      <rect width="132" height="132" rx="34" fill="url(#green)"/>
      <path d="M37 86c36-9 60-32 72-70-39 9-64 32-72 70Z" fill="#fbf8f1"/>
      <path d="M49 80c19-22 37-39 55-51" fill="none" stroke="#3a5c3e" stroke-width="5" stroke-linecap="round"/>
      <path d="M31 100c28 16 67 15 92-5" fill="none" stroke="#c99a6a" stroke-width="5" stroke-linecap="round"/>
      <circle cx="31" cy="100" r="5" fill="#fbf8f1"/><circle cx="123" cy="95" r="5" fill="#fbf8f1"/>
    </g>
    <text x="214" y="72" class="mono">01</text>
    <text x="214" y="104" class="card-title">Leaf Orbit</text>
    <text x="214" y="134" class="card-desc">叶片 + 轨道路径</text>
    <text x="214" y="158" class="card-desc">温和、有长期主义感</text>
  </g>

  <g transform="translate(507 190)" filter="url(#shadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".88" stroke="#fff"/>
    <g transform="translate(48 38)">
      <rect width="132" height="132" rx="34" fill="#fbf8f1" stroke="#3a5c3e" stroke-width="6"/>
      <path d="M30 40c23-8 45-2 64 16v58c-20-18-42-24-64-16V40Z" fill="#d9e6d2" stroke="#3a5c3e" stroke-width="4" stroke-linejoin="round"/>
      <path d="M94 56c20-18 42-24 64-16v58c-22-8-44-2-64 16V56Z" transform="translate(-26 0)" fill="#f1e6d6" stroke="#9a6b3f" stroke-width="4" stroke-linejoin="round"/>
      <path d="M66 96c14-31 31-47 58-55-8 29-25 48-58 55Z" fill="#3a5c3e"/>
      <path d="M76 91c15-16 28-28 42-39" fill="none" stroke="#fbf8f1" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="214" y="72" class="mono">02</text>
    <text x="214" y="104" class="card-title">Open Leaf Book</text>
    <text x="214" y="134" class="card-desc">打开的笔记 + 生长叶</text>
    <text x="214" y="158" class="card-desc">最贴合“知识分享”</text>
  </g>

  <g transform="translate(926 190)" filter="url(#shadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".88" stroke="#fff"/>
    <g transform="translate(48 38)">
      <circle cx="66" cy="66" r="66" fill="url(#green)"/>
      <path d="M29 85C50 42 77 28 106 26 100 64 78 88 43 95" fill="none" stroke="#fbf8f1" stroke-width="8" stroke-linecap="round"/>
      <path d="M35 91c23 20 57 22 86 2" fill="none" stroke="#c99a6a" stroke-width="6" stroke-linecap="round"/>
      <circle cx="29" cy="85" r="5" fill="#c99a6a"/>
      <circle cx="106" cy="26" r="5" fill="#fbf8f1"/>
      <circle cx="121" cy="93" r="5" fill="#c99a6a"/>
    </g>
    <text x="214" y="72" class="mono">03</text>
    <text x="214" y="104" class="card-title">Trail Sprout</text>
    <text x="214" y="134" class="card-desc">路径推进 + 新芽</text>
    <text x="214" y="158" class="card-desc">动态感强，寓意每天前进</text>
  </g>

  <g transform="translate(88 480)" filter="url(#shadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".88" stroke="#fff"/>
    <g transform="translate(48 38)">
      <rect width="132" height="132" rx="34" fill="url(#bark)"/>
      <path d="M35 95V33h62l24 24v38H35Z" fill="#fbf8f1"/>
      <path d="M97 33v25h24" fill="#d9e6d2"/>
      <path d="M56 83c26-5 43-20 52-47-27 5-45 21-52 47Z" fill="#3a5c3e"/>
      <path d="M65 78c14-14 26-25 38-33" fill="none" stroke="#fbf8f1" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="214" y="72" class="mono">04</text>
    <text x="214" y="104" class="card-title">Paper Seed</text>
    <text x="214" y="134" class="card-desc">文档纸张 + 种子叶</text>
    <text x="214" y="158" class="card-desc">很像技术笔记站点图标</text>
  </g>

  <g transform="translate(507 480)" filter="url(#shadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".88" stroke="#fff"/>
    <g transform="translate(48 38)">
      <rect width="132" height="132" rx="34" fill="#161b16"/>
      <path d="M36 93c31-8 51-28 61-60-32 8-53 28-61 60Z" fill="#88b189"/>
      <path d="M47 86c16-17 31-31 46-42" fill="none" stroke="#161b16" stroke-width="4" stroke-linecap="round"/>
      <path d="M29 109h34V87M63 109h42M105 109V82M43 29v31h26" fill="none" stroke="#c99a6a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="29" cy="109" r="5" fill="#fbf8f1"/><circle cx="105" cy="82" r="5" fill="#fbf8f1"/><circle cx="43" cy="29" r="5" fill="#fbf8f1"/><circle cx="69" cy="60" r="5" fill="#fbf8f1"/>
    </g>
    <text x="214" y="72" class="mono">05</text>
    <text x="214" y="104" class="card-title">Circuit Leaf</text>
    <text x="214" y="134" class="card-desc">电路节点 + 叶片</text>
    <text x="214" y="158" class="card-desc">技术感最强，适合工程博客</text>
  </g>

  <g transform="translate(926 480)" filter="url(#shadow)">
    <rect width="386" height="250" rx="28" fill="#fffaf1" opacity=".88" stroke="#fff"/>
    <g transform="translate(48 38)">
      <rect width="132" height="132" rx="34" fill="url(#green)"/>
      <path d="M30 77c25-39 59-55 96-50-12 43-43 68-90 73" fill="none" stroke="#fbf8f1" stroke-width="8" stroke-linecap="round"/>
      <path d="M31 103c31-9 57 9 91-1" fill="none" stroke="#c99a6a" stroke-width="5" stroke-linecap="round"/>
      <path d="M45 96c19-26 42-45 68-58" fill="none" stroke="#fbf8f1" stroke-width="4" stroke-linecap="round" opacity=".75"/>
    </g>
    <text x="214" y="72" class="mono">06</text>
    <text x="214" y="104" class="card-title">Editorial Leaf</text>
    <text x="214" y="134" class="card-desc">更克制的叶形符号</text>
    <text x="214" y="158" class="card-desc">适合作为全站默认品牌图标</text>
  </g>

  <text x="90" y="810" class="sub">建议：想要“知识分享”选 02 / 04；想要“工程技术感”选 05；想要“高级默认品牌感”选 01 / 06。</text>
  <text x="90" y="848" class="sub">我个人更推荐 06：符号简洁，缩小到 favicon 或导航栏也更稳。</text>
</svg>
